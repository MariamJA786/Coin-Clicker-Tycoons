<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Clicker Tycoon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            user-select: none;
        }
        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .stats {
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
        }
        .coins {
            font-size: 3rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .per-sec {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        #coinBtn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffd700, #ffed4e);
            border: 8px solid #ffb700;
            font-size: 4rem;
            cursor: pointer;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        #coinBtn:active {
            transform: scale(0.95);
        }
        .upgrades {
            margin-top: 30px;
        }
        .upgrade {
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upgrade:hover {
            background: rgba(255,255,255,0.25);
        }
        .upgrade:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .upgrade-name {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .upgrade-cost {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Coin Clicker Tycoon</h1>
        
        <div class="stats">
            <div class="coins"><span id="coinCount">0</span> Coins</div>
            <div class="per-sec"><span id="perSec">0</span> per second</div>
        </div>

        <div id="coinBtn">🪙</div>

        <div class="upgrades">
            <h2>Upgrades</h2>
            <div class="upgrade" id="clickUpgrade">
                <div class="upgrade-name">Better Clicks</div>
                <div class="upgrade-cost">Cost: <span id="clickCost">10</span> coins | +1 per click</div>
            </div>
            <div class="upgrade" id="autoUpgrade">
                <div class="upgrade-name">Auto Clicker</div>
                <div class="upgrade-cost">Cost: <span id="autoCost">50</span> coins | +1 per sec</div>
            </div>
            <div class="upgrade" id="factoryUpgrade">
                <div class="upgrade-name">Coin Factory</div>
                <div class="upgrade-cost">Cost: <span id="factoryCost">500</span> coins | +10 per sec</div>
            </div>
        </div>
    </div>

    <script>
        let coins = 0;
        let coinsPerClick = 1;
        let coinsPerSec = 0;
        
        let clickLevel = 0;
        let autoLevel = 0;
        let factoryLevel = 0;

        const coinCountEl = document.getElementById('coinCount');
        const perSecEl = document.getElementById('perSec');
        const coinBtn = document.getElementById('coinBtn');
        
        const clickUpgrade = document.getElementById('clickUpgrade');
        const autoUpgrade = document.getElementById('autoUpgrade');
        const factoryUpgrade = document.getElementById('factoryUpgrade');

        function updateDisplay() {
            coinCountEl.textContent = Math.floor(coins).toLocaleString();
            perSecEl.textContent = coinsPerSec.toLocaleString();
            
            document.getElementById('clickCost').textContent = getClickCost().toLocaleString();
            document.getElementById('autoCost').textContent = getAutoCost().toLocaleString();
            document.getElementById('factoryCost').textContent = getFactoryCost().toLocaleString();
            
            clickUpgrade.disabled = coins < getClickCost();
            autoUpgrade.disabled = coins < getAutoCost();
            factoryUpgrade.disabled = coins < getFactoryCost();
        }

        function getClickCost() { return Math.floor(10 * Math.pow(1.5, clickLevel)); }
        function getAutoCost() { return Math.floor(50 * Math.pow(1.5, autoLevel)); }
        function getFactoryCost() { return Math.floor(500 * Math.pow(1.5, factoryLevel)); }

        coinBtn.addEventListener('click', () => {
            coins += coinsPerClick;
            updateDisplay();
            coinBtn.style.transform = 'scale(0.95)';
            setTimeout(() => coinBtn.style.transform = 'scale(1)', 100);
        });

        clickUpgrade.addEventListener('click', () => {
            const cost = getClickCost();
            if (coins >= cost) {
                coins -= cost;
                clickLevel++;
                coinsPerClick++;
                updateDisplay();
            }
        });

        autoUpgrade.addEventListener('click', () => {
            const cost = getAutoCost();
            if (coins >= cost) {
                coins -= cost;
                autoLevel++;
                coinsPerSec++;
                updateDisplay();
            }
        });

        factoryUpgrade.addEventListener('click', () => {
            const cost = getFactoryCost();
            if (coins >= cost) {
                coins -= cost;
                factoryLevel++;
                coinsPerSec += 10;
                updateDisplay();
            }
        });

        // Auto-generate coins every second
        setInterval(() => {
            coins += coinsPerSec;
            updateDisplay();
        }, 1000);

        updateDisplay();
    </script>
</body>
</html>
